# Bottom-up Stage 2: Upper trains (PPO) with Lower frozen (loaded from BU-1 trained model)
# Red opponent: RsaAgentHeuristicMove (rule-based movement, random target)
# Scene: HRL_Ablation_6vs6_BU2.unity (to be created from current scene)

behaviors:
  UpperAgent1:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 2048
      learning_rate: 3.5e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 1000000
    time_horizon: 64
    summary_freq: 5000
    threaded: true
    self_play:
      save_steps: 50000
      swap_steps: 2000
      window: 10
      play_against_latest_model_ratio: 0.5
      team_change: 999999999
      initial_elo: 1200.0

  LowerAgent1:
    trainer_type: poca
    hyperparameters:
      batch_size: 10
      buffer_size: 128
      learning_rate: 0
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.98
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 0
    time_horizon: 64
    summary_freq: 1000
    threaded: true
    self_play:
      save_steps: 50000
      team_change: 999999999
      swap_steps: 2000
      window: 10
      play_against_latest_model_ratio: 0.5

  MarlAgent1:
    trainer_type: poca
    hyperparameters:
      batch_size: 64
      buffer_size: 2048
      learning_rate: 0
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 0
    time_horizon: 64
    summary_freq: 5000
    threaded: true
    self_play:
      save_steps: 50000
      team_change: 2000
      swap_steps: 2000
      window: 10
